# Configuration Prometheus pour le monitoring en temps réel

global:
  scrape_interval: 15s          # Scraper tous les 15 secondes
  evaluation_interval: 15s      # Évaluer les règles tous les 15 secondes
  external_labels:
    monitor: 'heroes-platform'
    environment: 'production'

# Cibles à scraper
scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Application Flask
  - job_name: 'flask-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['web:5000']
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Base de données PostgreSQL (si exporteur installé)
  # Exporter Postgres
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

# Alertes (optionnel)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Fichiers de règles (optionnel)
rule_files:
  # - 'alert.rules.yml'